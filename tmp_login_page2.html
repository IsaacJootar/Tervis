        width: 100%;

        border-radius: 50%;

        width: 100px;

        right: -20px;

        height: 60px;
        top: 50%;
        right: 20px;
        animation: float 8s ease-in-out infinite;
    }

    .shape-3 {
        width: 80px;
        height: 80px;
        bottom: -10px;
        right: 50px;
        animation: float 7s ease-in-out infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(0);
        }

            transform: translateY(-20px);
        }

            transform: translateY(0);
        }
    }
